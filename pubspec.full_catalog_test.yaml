name: opc_v4
description: "OPC v4.0 - Organizator pogrebne ceremonije"
publish_to: 'none'
version: 4.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # Database
  drift: ^2.26.1
  drift_flutter: ^0.3.0
  sqlite3_flutter_libs: ^0.6.0+eol

  # PDF
  pdf: ^3.11.3
  printing: ^5.14.2

  # File system
  path_provider: ^2.1.5
  file_picker: ^11.0.2
  path: ^1.9.1

  # Images & media
  image_picker: ^1.1.2

  # Crypto (PIN hash)
  crypto: ^3.0.6

  # Internationalization (Serbian day/month names)
  intl: ^0.20.2

  # Local reminders
  flutter_local_notifications: ^21.0.0
  flutter_timezone: ^5.0.2
  timezone: ^0.11.0

  # Share files from Android
  share_plus: ^12.0.2

  # Window management (Windows/macOS/Linux - intercept close button)
  window_manager: ^0.5.1

  # Windows MSIX packaging (build-time)
  msix: ^3.16.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.26.1
  build_runner: ^2.4.15
  test: ^1.30.0

flutter:
  uses-material-design: true

  assets:
    - assets/simboli/
    - assets/katalog_foto/

  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSans-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/NotoSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/NotoSans-BoldItalic.ttf
          weight: 700
          style: italic
