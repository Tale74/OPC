name: OPC Manifest Gate

on:
  push:
  pull_request:

jobs:
  manifest-gate:
    name: Validate OPC manifest gate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate changed task reports
        env:
          OPC_MANIFEST_GATE_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: python scripts/validate_opc_manifest_gate.py

